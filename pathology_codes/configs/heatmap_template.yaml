exp_arguments:
  n_classes: 2
  save_exp_code: pathology_heatmap
  raw_save_dir: path/to/raw_heatmap_outputs
  production_save_dir: path/to/rendered_heatmaps
  batch_size: 384

data_arguments:
  data_dir: path/to/whole_slide_images
  data_dir_key: source
  process_list: path/to/pathology_process_list.csv
  preset: path/to/tissue_preset.csv
  slide_ext: .svs
  label_dict:
    0: 0
    1: 1

patching_arguments:
  patch_size: 256
  overlap: 0.0
  patch_level: 0
  custom_downsample: 1

model_arguments:
  ckpt_path: path/to/s_0_checkpoint.pt
  model_type: clam_sb
  initiate_fn: initiate_model
  model_size: small
  drop_out: 0.25

heatmap_arguments:
  vis_level: -1
  alpha: 0.4
  blank_canvas: false
  save_orig: true
  save_ext: png
  use_ref_scores: true
  blur: false
  use_center_shift: true
  use_roi: false
  calc_heatmap: true
  binarize: false
  binary_thresh: -1
  custom_downsample: 1
  cmap: jet

sample_arguments:
  samples:
    - name: topk_high_attention
      sample: true
      seed: 1
      k: 15
      mode: topk
